<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ayoub Playground</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0b10;
      --panel: rgba(18, 20, 30, 0.86);
      --panel-2: rgba(24, 27, 40, 0.92);
      --line: rgba(255,255,255,0.08);
      --text: #f5f7ff;
      --muted: #a6afd3;
      --primary: #7c5cff;
      --secondary: #00c2ff;
      --accent: #39d98a;
      --warning: #ffb84d;
      --radius: 22px;
      --shadow: 0 20px 60px rgba(0,0,0,0.35);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: 'Cairo', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, rgba(124,92,255,.28), transparent 26%),
        radial-gradient(circle at 85% 15%, rgba(0,194,255,.18), transparent 24%),
        radial-gradient(circle at 50% 100%, rgba(57,217,138,.16), transparent 30%),
        linear-gradient(180deg, #0a0b10 0%, #090b14 100%);
      overflow-x: hidden;
    }
    .bg-grid {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: radial-gradient(circle at center, black 40%, transparent 90%);
    }
    .shell {
      width: min(1400px, calc(100% - 32px));
      margin: 18px auto;
      position: relative;
      z-index: 1;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(10, 12, 18, 0.75);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }
    .brand img {
      width: 64px;
      height: 64px;
      object-fit: contain;
      border-radius: 18px;
      background: rgba(255,255,255,0.94);
      padding: 6px;
      box-shadow: 0 8px 28px rgba(124,92,255,.22);
      animation: floaty 4.5s ease-in-out infinite;
    }
    .brand h1 {
      font-size: clamp(1.15rem, 2vw, 1.65rem);
      margin: 0;
      font-weight: 800;
      letter-spacing: .2px;
    }
    .brand p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: .93rem;
    }
    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    button, .file-label {
      border: 1px solid rgba(255,255,255,.1);
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      color: var(--text);
      padding: 11px 16px;
      border-radius: 14px;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform .22s ease, box-shadow .22s ease, border-color .22s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    button:hover, .file-label:hover {
      transform: translateY(-2px);
      border-color: rgba(124,92,255,.45);
      box-shadow: 0 12px 24px rgba(124,92,255,.18);
    }
    .primary {
      background: linear-gradient(135deg, var(--primary), #5aa9ff);
      border: none;
      box-shadow: 0 12px 26px rgba(124,92,255,.32);
    }
    input[type=file] { display: none; }
    .workspace {
      display: grid;
      grid-template-columns: 1.08fr 0.92fr;
      gap: 16px;
      min-height: calc(100vh - 180px);
    }
    .panel {
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(18px);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .editor-header, .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      background: rgba(255,255,255,.03);
      border-bottom: 1px solid var(--line);
    }
    .dots { display: flex; gap: 8px; }
    .dots span {
      width: 11px; height: 11px; border-radius: 50%; display: block;
      background: #ff5f57;
      box-shadow: 20px 0 0 #febc2e, 40px 0 0 #28c840;
      margin-inline-end: 40px;
    }
    .tabs { display: flex; gap: 8px; flex-wrap: wrap; }
    .tab {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: .92rem;
      color: var(--muted);
      background: transparent;
      border: 1px solid transparent;
    }
    .tab.active {
      color: #fff;
      background: rgba(124,92,255,.14);
      border-color: rgba(124,92,255,.36);
    }
    .editor-body {
      display: grid;
      grid-template-rows: 1fr;
      min-height: 650px;
    }
    .code-pane { display: none; height: 100%; }
    .code-pane.active { display: block; }
    textarea {
      width: 100%;
      height: 100%;
      min-height: 650px;
      border: none;
      outline: none;
      resize: none;
      padding: 22px;
      background: #0d1018;
      color: #edf2ff;
      font: 14px/1.8 'JetBrains Mono', monospace;
      direction: ltr;
    }
    .preview-wrap {
      background: var(--panel-2);
      display: flex;
      flex-direction: column;
    }
    .preview-meta {
      color: var(--muted);
      font-size: .9rem;
    }
    iframe {
      width: 100%;
      height: 100%;
      min-height: 700px;
      border: 0;
      background: white;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #dfffea;
      font-size: .9rem;
      background: rgba(57,217,138,.12);
      border: 1px solid rgba(57,217,138,.25);
      padding: 8px 12px;
      border-radius: 999px;
    }
    .status::before {
      content: '';
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 6px rgba(57,217,138,.12);
      animation: pulse 1.8s infinite;
    }
    .footer-note {
      text-align: center;
      padding: 22px 16px 30px;
      color: var(--muted);
      font-size: 1rem;
    }
    .footer-note span {
      display: inline-block;
      color: #fff;
      background: linear-gradient(135deg, rgba(124,92,255,.22), rgba(0,194,255,.18));
      border: 1px solid rgba(255,255,255,.08);
      padding: 10px 18px;
      border-radius: 999px;
      animation: glow 3s ease-in-out infinite;
    }
    .sparkle {
      display: inline-block;
      animation: wiggle 2.4s ease-in-out infinite;
    }
    @keyframes floaty {
      0%,100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }
    @keyframes pulse {
      0% { transform: scale(.95); opacity: .75; }
      70% { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(.95); opacity: .75; }
    }
    @keyframes glow {
      0%,100% { box-shadow: 0 0 0 rgba(124,92,255,0); transform: translateY(0); }
      50% { box-shadow: 0 0 24px rgba(124,92,255,.18); transform: translateY(-2px); }
    }
    @keyframes wiggle {
      0%,100% { transform: rotate(0deg) scale(1); }
      25% { transform: rotate(-8deg) scale(1.08); }
      50% { transform: rotate(6deg) scale(1); }
      75% { transform: rotate(-4deg) scale(1.06); }
    }
    @media (max-width: 1100px) {
      .workspace { grid-template-columns: 1fr; }
      iframe, textarea { min-height: 500px; }
    }
    @media (max-width: 720px) {
      .shell { width: min(100% - 16px, 1400px); }
      .topbar { padding: 12px; border-radius: 18px; }
      .brand img { width: 54px; height: 54px; }
      .brand { align-items: flex-start; }
      .editor-header, .preview-header { padding: 12px; }
      .tab { padding: 8px 12px; font-size: .86rem; }
      textarea { padding: 16px; font-size: 13px; }
      .footer-note { font-size: .92rem; }
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <img src="https://ik.imagekit.io/imgayoub/LOGO/ayoub.pw%20logo%20many%20size/apple-touch-icon.png?updatedAt=1774898725464" alt="Ayoub logo" />
        <div>
          <h1>Ayoub Playground</h1>
          <p>ارفع ملفاتك، عدّل الكود، وشاهد النتيجة مباشرة بأسلوب عصري.</p>
        </div>
      </div>
      <div class="actions">
        <label class="file-label" for="htmlUpload">📂 رفع HTML</label>
        <input id="htmlUpload" type="file" accept=".html,text/html" />
        <button id="runBtn" class="primary">⚡ تشغيل المعاينة</button>
      </div>
    </header>

    <main class="workspace">
      <section class="panel">
        <div class="editor-header">
          <div class="dots"><span></span></div>
          <div class="tabs">
            <button class="tab active" data-tab="html">index.html</button>
            <button class="tab" data-tab="css">style.css</button>
            <button class="tab" data-tab="js">script.js</button>
          </div>
          <div class="status">Live Editing</div>
        </div>
        <div class="editor-body">
          <div class="code-pane active" data-pane="html">
            <textarea id="htmlCode"><section class="hero">
  <div class="badge">✨ Ayoub Project</div>
  <h1>Build something beautiful.</h1>
  <p>هذه معاينة أولية داخل محرر Ayoub. عدّل HTML و CSS و JavaScript وشاهد النتيجة فورًا.</p>
  <button class="hero-btn">ابدأ الآن 🚀</button>
</section></textarea>
          </div>
          <div class="code-pane" data-pane="css">
            <textarea id="cssCode">body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  place-items: center;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #f6f7fb, #eef3ff);
}
.hero {
  width: min(680px, calc(100% - 32px));
  padding: 40px;
  border-radius: 28px;
  text-align: center;
  background: white;
  box-shadow: 0 20px 50px rgba(72, 87, 129, 0.15);
}
.badge {
  display: inline-block;
  margin-bottom: 14px;
  padding: 8px 14px;
  border-radius: 999px;
  background: #efe9ff;
  color: #6b4dff;
  font-weight: 700;
}
h1 {
  margin: 0 0 12px;
  font-size: clamp(2rem, 4vw, 3.2rem);
}
p {
  margin: 0 auto 20px;
  max-width: 52ch;
  color: #556070;
  line-height: 1.8;
}
.hero-btn {
  border: none;
  padding: 14px 24px;
  border-radius: 14px;
  background: linear-gradient(135deg, #7c5cff, #4fa8ff);
  color: white;
  font-size: 1rem;
  cursor: pointer;
}</textarea>
          </div>
          <div class="code-pane" data-pane="js">
            <textarea id="jsCode">document.querySelector('.hero-btn')?.addEventListener('click', () => {
  alert('Welcome to Ayoub Playground ✨');
});</textarea>
          </div>
        </div>
      </section>

      <section class="panel preview-wrap">
        <div class="preview-header">
          <div>
            <strong>Preview</strong>
            <div class="preview-meta">معاينة فورية للمشروع الحالي</div>
          </div>
          <button id="refreshBtn">🔄 تحديث</button>
        </div>
        <iframe id="previewFrame" title="Project Preview"></iframe>
      </section>
    </main>

    <footer class="footer-note">
      <span>Made by with love from Vienna <span class="sparkle">❤️</span> <span class="sparkle">✨</span> <span class="sparkle">🇦🇹</span></span>
    </footer>
  </div>

  <script>
    const tabs = document.querySelectorAll('.tab');
    const panes = document.querySelectorAll('.code-pane');
    const htmlCode = document.getElementById('htmlCode');
    const cssCode = document.getElementById('cssCode');
    const jsCode = document.getElementById('jsCode');
    const previewFrame = document.getElementById('previewFrame');
    const runBtn = document.getElementById('runBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const htmlUpload = document.getElementById('htmlUpload');

    function switchTab(name) {
      tabs.forEach(tab => tab.classList.toggle('active', tab.dataset.tab === name));
      panes.forEach(pane => pane.classList.toggle('active', pane.dataset.pane === name));
    }

    tabs.forEach(tab => {
      tab.addEventListener('click', () => switchTab(tab.dataset.tab));
    });

    function renderPreview() {
      const doc = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>${cssCode.value}</style>
</head>
<body>
${htmlCode.value}
<script>${jsCode.value}<\/script>
</body>
</html>`;
      previewFrame.srcdoc = doc;
    }

    runBtn.addEventListener('click', renderPreview);
    refreshBtn.addEventListener('click', renderPreview);
    [htmlCode, cssCode, jsCode].forEach(el => {
      el.addEventListener('input', () => {
        clearTimeout(window.__ayoubTimer);
        window.__ayoubTimer = setTimeout(renderPreview, 280);
      });
    });

    htmlUpload.addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = event => {
        htmlCode.value = event.target.result;
        switchTab('html');
        renderPreview();
      };
      reader.readAsText(file);
    });

    renderPreview();
  </script>
</body>
</html>
